---
- name: Debian Workstation Configuration
  hosts: localhost
  connection: local
  become: yes

  vars:
    # --- VERSION MANAGEMENT ---
    go_version: "1.22.1"
    tfenv_version: "v3.0.0"
    username: "{{ ansible_user_id }}" # Retrieves the current user ID

  tasks:
    - name: "[APT] Update apt cache"
      tags: apt
      apt:
        update_cache: yes

    - name: "[APT] Install standard packages"
      tags: apt
      apt:
        name:
          - vim
          - tmux
          - alacritty
          - curl
          - git
          - unzip
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - xdg-utils # Required for setting default browser
        state: present

    - name: "[APT] Install xfce packages"
      tags: apt
      apt:
        name:
          - arc-theme
          - papirus-icon-theme
          - fonts-inter
          - fonts-cascadia-code
          - xfce4-goodies
        state: present

    # --- GO INSTALLATION ---
    - name: "[GO] Check if Go is already installed"
      tags: golang
      command: go version
      register: go_installed
      ignore_errors: yes
      changed_when: false
      become: no

    - name: "[GO] Download and install Go"
      tags: golang
      block:
        - name: Download Go archive
          get_url:
            url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
            dest: "/tmp/go.tar.gz"
        - name: Remove old Go version
          file:
            path: /usr/local/go
            state: absent
        - name: Extract Go to /usr/local
          unarchive:
            src: "/tmp/go.tar.gz"
            dest: /usr/local
            remote_src: yes
      when: go_installed.failed or go_version not in go_installed.stdout

    - name: "[GO] Ensure Go binaries are in PATH"
      tags: golang
      lineinfile:
        path: "/home/{{ username }}/.bashrc"
        line: "export PATH=$PATH:/usr/local/go/bin"
        create: yes
        state: present
      become: no

    # --- BRAVE BROWSER INSTALLATION ---
    - name: "[BRAVE] Download Brave Browser GPG key"
      tags: brave
      get_url:
        url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
        mode: "0644"

    - name: "[BRAVE] Add Brave Browser repository"
      tags: brave
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
        state: present
        filename: brave-browser-release

    - name: "[BRAVE] Install Brave Browser"
      tags: brave
      apt:
        name: brave-browser
        state: present
        update_cache: yes

    # --- 1PASSWORD INSTALLATION ---
    - name: Download 1Password GPG key
      tags: 1password
      get_url:
        url: https://downloads.1password.com/linux/keys/1password.asc
        dest: /usr/share/keyrings/1password-archive-keyring.gpg
        mode: "0644"

    - name: Add 1Password repository
      tags: 1password
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
        state: present
        filename: 1password

    - name: Install 1Password and 1Password CLI
      tags: 1password
      apt:
        name:
          - 1password
          - 1password-cli
        state: present
        update_cache: yes

    # --- TFENV INSTALLATION ---
    - name: Clone tfenv repository
      tags: terraform
      git:
        repo: "https://github.com/tfutils/tfenv.git"
        dest: "/home/{{ username }}/.tfenv"
        version: "{{ tfenv_version }}"
      become: no

    - name: Create symlinks for tfenv and terraform
      tags: terraform
      file:
        src: "/home/{{ username }}/.tfenv/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
      loop:
        - tfenv
        - terraform

    # --- CLIs (AWS & AZURE) ---
    - name: "[AWS] install AWS CLI v2"
      tags: aws
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -o awscliv2.zip
        ./aws/install --update
        rm -rf aws awscliv2.zip
      args:
        chdir: /tmp
        creates: /usr/local/bin/aws

    - name: "[AZURE] Add Microsoft GPG key for Azure CLI"
      tags: azure
      get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /usr/share/keyrings/microsoft.gpg
        mode: "0644"

    - name: "[AZURE] Add Azure CLI repository (Forced to Bookworm for Trixie compatibility)"
      tags: azure
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ bookworm main"
        state: present
        filename: azure-cli

    - name: "[AZURE] Install Azure CLI"
      tags: azure
      apt:
        name: azure-cli
        state: present
        update_cache: yes

    # --- DEFAULT APPLICATIONS ---
    - name: "[BRAVE] Set Alacritty as default terminal"
      tags: brave
      alternatives:
        name: x-terminal-emulator
        path: /usr/bin/alacritty
        link: /usr/bin/x-terminal-emulator
        priority: 100

    - name: "[BRAVE] Set Brave as default browser (System alternatives)"
      tags: brave
      alternatives:
        name: x-www-browser
        path: /usr/bin/brave-browser
        link: /usr/bin/x-www-browser
        priority: 100

    - name: "[BRAVE] Set Brave as default browser (User XDG settings)"
      tags: brave
      become: no
      command: xdg-settings set default-web-browser brave-browser.desktop
      changed_when: false

    # --- XFCE CUSTOMIZATION ---
    - name: "[XFCE] Configure Theme and Icons"
      shell: |
        xfconf-query -c xsettings -p /Net/ThemeName -s "Arc-Dark"
        xfconf-query -c xsettings -p /Net/IconThemeName -s "Papirus"
        xfconf-query -c xfwm4 -p /general/theme -s "Arc-Dark"
        xfconf-query -c xsettings -p /Gtk/FontName -s "Inter Regular 11"
      changed_when: false
      become: no

    - name: "[XFCE] Enable Compositor (Shadows and Effects)"
      command: xfconf-query -c xfwm4 -p /general/use_compositing -s true
      changed_when: false
      become: no

    # --- ALACRITTY CUSTOMIZATION ---
    - name: "[ALACRITTY] Create config directory"
      file:
        path: "/home/{{ username }}/.config/alacritty"
        state: directory
        mode: "0755"
      become: no

    - name: "[ALACRITTY] Deploy configuration from template"
      template:
        src: templates/alacritty.toml.j2
        dest: "/home/{{ username }}/.config/alacritty/alacritty.toml"
        mode: "0644"
      become: no
